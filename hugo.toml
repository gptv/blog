baseURL = 'https://bdfz.net/'
languageCode = 'en-us'
title = 'BDFZ-Suen'
theme = "bearblog-neo"

[menu]
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 1

[params]
    postSearch = true
    groupByYear = false
    toc = true
    showTitle = true
    showDate = true
    upvote = true
    upvoteURL = "https://upvote.bdfz.net/" 
    customFooter = """
    <p>Powered by Suen · <a href="https://bdfz.net">bdfz.net</a></p>
    """

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true